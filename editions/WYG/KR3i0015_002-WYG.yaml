body:
  text: 香譜卷下香之事述香説文曰芳也篆従黍従甘𨽻省作香春秋傳曰黍稷馨香凡香之屬皆従香香之逺聞曰馨香之美者曰􅤩音使香之氣曰馦火兼反曰馣音淹曰馧於云反曰馥扶福反曰􅀈音愛曰􅶵方滅反曰馪音繽曰馢音牋曰馛步末反曰䭱匹結反曰馝滿結反曰馞音悖曰馠火含反曰馩音焚曰馚上同曰􅀈奴昆反曰􅀈音彭􅀈􅀈大香曰馟他胡反曰䭲音倚曰馜音你曰䭯普没反曰􅀈滿結反曰􅀈普滅反曰􅀈烏孔反曰音瓢至治馨香尚書曰至治馨香感于神明有飶其香毛詩有飶其香邦家之光其香始升毛詩其香始升上帝居歆昭其馨香國語其徳足以昭其馨香國香左𫝊蘭有國香乆而聞其香國語入芝蘭之室久而聞其香香序宋范煜字蔚宗撰和香方其序云麝本多忌過分必害沈實易和盈斤無傷零霍􅆭虐詹糖粘濕甘松蘇合安息鬱金捺多和羅之屬並被於外國無取於中土又棗膏昏懞甲馢淺俗非惟無助於馨烈乃當彌増於尤疾也此序所言悉以比類朝士麝本多忌比庾憬之棗膏昏懞比羊𤣥保甲馢淺俗比徐湛之甘松蘇合比惠休道人沈實易和葢自比也香尉述異記漢雍仲子進南海香物拜涪陽尉人謂之香尉香市述異記曰南方有香市乃商人交易香處薰爐應劭漢官儀曰尚書郎入直臺中給女侍史二人皆選端正指使従直女侍史執香爐燒薰以従入臺中給使護衣懐香漢官興職曰尚書郎懐香握蘭趨走丹墀香户述異記曰南海郡有採香户香洲述異記曰朱崖郡洲中出諸異香徃徃有不知名者披香殿漢宫閣名長安有合歡殿披香殿採香徑郡國志吴王闔閭起響屧廊採香徑㗖香杜陽編元載寵姬薛瑤英母趙姢幼以香㗖英故肌肉悉香愛香襄陽記劉季和性愛香常如厠還輒過香爐上主簿張坦曰人名公作俗人不虚也季和曰荀令君至人家坐席三日香為我如何坦曰醜婦效顰見者必走公欲遁走耶季和大笑含香應劭漢官曰侍中刁存年老口臭上出雞舌香含之竊香晉書韓夀字徳真為賈充司空掾充女窺見夀而悦焉因婢通殷勤夀踰垣而至時西域有貢竒香一著人經月不歇帝以賜充其女宻盜以遺夀後充與夀宴聞其芬馥意知女與夀通遂祕之以女妻夀香囊謝𤣥常佩紫羅香囊謝安患之而不欲傷其意因戲賭取焚之𤣥遂止又古詩云香囊懸肘後沈香牀異苑沙門支法有八尺沈香牀金香爐魏武上雜物疏曰御物三十種有純金香爐一枚博山香爐東宫故事曰黄太子初拜有銅博山香爐西京雜記丁緩又作九層博山香爐被中香爐西京雜記被中香爐本出房風其法後絶長安巧工丁緩始更之機環運轉四周而爐體常平可置之於被褥故以為名沈香火山杜陽編隋煬帝毎除夜殿前設火山數十皆沈香木根毎一山焚沈香數車暗即以甲􅋩沃之香聞數十里檀香亭杜陽編宣州觀察使楊牧造檀香亭子初成命賔樂之沈香亭李白後集序開元中禁中初重木芍藥即今牡丹也得四本紅紫淺紅通白者上因移植扵興慶池東沈香亭前五色香煙三洞珠囊許逺遊燒香皆五色香煙出香珠三洞珠囊以雜香𢷬之丸如梧桐子大青繩穿此三皇眞元之香珠也燒之香徹天金香右司命君王易度游于東板廣昌之城長樂之鄊天女灌以平露金香八㑹之湯瓊鳯𤣥脯鵲尾香爐宋玉賢山隂人也既稟女質厥志彌髙自専年及筓應適女兄許氏宻具法服登車既至夫門時及交禮更著黄巾裙手執鵲尾香爐不親婦禮賔主駭愕夫家力不能屈乃放還遂出家梁大同初𨼆弱溪之間百刻香近世尚竒者作香篆其文準十二辰分一百刻凡然一晝夜乃巳水浮香然紙灰以印香篆浮之水面􅅡竟不沈香獸以塗金為狻猊麒麟鳬鴨之狀空中以然香使煙自口出以為玩好復有雕木埏土以為之者香篆鏤木以為之以範香塵為篆文然於飲席或佛像前往往有至二三尺徑者焚香讀孝經陳書岑之敬字思禮淳謹有孝行五歳讀孝經必焚香正坐防蠧徐陵玉臺新詠序曰辟惡生香聊防羽陵之蠧香溪吴宫故有香溪乃西施浴處又呼為脂粉溪牀畔香童天寳遺事王元寳好賔客務於華侈器玩服用僣於王公而四方之士盡歸仰焉常於寢帳牀前刻矮童二人捧七寳博山香爐自暝焚香徹曙其驕貴如此四香閤天寳遺事云楊國忠嘗用沈香為閤檀香為欄檻以麝香乳香篩土和為泥飾閤壁毎於春時木芍藥盛開之際聚賔於此閤上賞花焉禁中沈香之亭殆不侔此壯麗者也香界楞嚴經云因香所生以香為界香嚴童子楞嚴經云香嚴童子白佛言我諸比丘燒水沈香香氣寂然來入鼻中非木非空非煙非火去無所著來無所從由是意銷發明無漏得阿羅漢天香傳見丁晉公本集古詩詠香爐四座且莫諠願聽歌一言請説銅香爐崔嵬象南山上枝似松栢下根據銅盤雕文各異類離婁自相連誰能為此器公輸與魯般朱火然其中青煙颺其間順風入君懐四座莫不歡香風難乆居空令蕙草殘齊劉繪詠博山香爐詩參差鬱佳麗合沓紛可憐蔽虧千種樹出没萬重山上鏤周王子駕鶴乗紫煙下刻盤龍勢矯首半銜連傍為伊水麗芝葢出嵓間復有漢游女拾羽弄餘妍榮色何雜糅縟繡更相鮮麏麚或騰倚林薄杳芊眠掩華如不發含薰未肯然風生四堦樹露湛曲池蓮寒蟲飛夜室秋虚没暁天梁昭明太子銅博山香爐賦稟至精之純質産靈嶽之幽深探般倕之妙㫖運公輸之巧心有蕙帶而嵓𨼆亦霓裳而升僊寫嵩山之巃嵸象鄧林之芊眠於時青煙司寒夕光翳景翠帷已低蘭膏未屛炎蒸内耀苾芬外揚似慶雲之呈色若景星之舒光信名嘉而用美永為玩於華堂漢劉向薰爐銘嘉此正氣嶃嵓若山上貫太華承以銅盤中有蘭綺朱火青煙梁孝元帝香爐銘蘇合氤氲飛煙若雲時濃更薄乍聚還分火微難盡風長易聞孰云道力慈悲所薰古詩博山爐中百和香鬱金蘇合與都梁紅羅複斗帳四角垂香囊開奩集香蘇金爐絶沈燎金泥蘇合香薰爐雜棗香丹轂七車香百和裛衣香香之法蜀王薰御衣法丁香馢香沈香檀香麝香已上各一兩甲香三兩製如常法右件香𢷬為末用白沙蜜輕煉過不得熱用合和令勻入用之江南李王帳中香法右件用沈香一兩細剉加以鵞梨十枚研取汁於銀器内盛却蒸三次梨汁乾即用之唐化度寺牙香法沈香一兩半白檀香五兩蘇合香一兩甲香一兩煮龍腦半兩麝香半兩右件香細剉𢷬為末用馬尾篩羅煉蜜溲和得所用之雍文徹郎中牙香法沈香檀香甲香馢香各一兩黄熟香一兩龍麝各半兩右件𢷬羅為末煉蜜拌和勻入新瓷器中貯之宻封埋地中一月取出用延安郡公蘂香法𤣥參半斤浄洗去塵土於銀器中以水煑令熟控乾切入銚中慢火炒令微煙出甘松四兩擇去雜草塵土方秤定細剉之白檀香剉麝香顆者俟别藥成末方入研的乳香細研同麝香入上三味各二錢右並新好者杵羅為末煉蜜和勻丸如雞頭大毎藥末一兩使熟蜜一兩未丸前再入杵臼百餘下油單宻封貯瓷器中旋取燒之供佛濕香法檀香二兩零陵香馢香藿香白芷丁香皮甜參各一兩甘松乳香各半兩消石一分右件依常法事治碎剉焙乾𢷬為細末别用白茅香八兩碎擘去泥焙乾用火燒候火焰欲絶急以盆葢手巾圍盆口勿令通氣放冷取茅香灰𢷬為末與前香一處逐旋入經煉好蜜相和重入藥臼𢷬令軟硬得所貯不津器中旋取燒之牙香法沈香白檀香乳香青桂香降眞香甲香灰汁煑少時取出放冷用甘水浸一宿取出令焙乾龍腦麝香已上八味各半兩𢷬羅為末煉蜜拌令勻右别將龍腦麝香於浄器中研細入令匀用之又牙香法黄熟香馢香沈香各五兩檀香零陵香藿香甘松丁香皮各三兩麝香甲香三兩黄泥漿煑一日後用酒煑一日硝石龍腦各三分乳香半兩右件除硝石龍腦乳麝同研細外將諸香𢷬羅為散先用蘇合油一茶脚許更入煉過蜜二斤攪和令匀以瓷合貯之埋地中一月取出用之又牙香法沈香四兩檀香五兩結香藿香零陵香甘松已上各四兩丁香皮甲香各二分麝香龍腦各三分茅香四兩燒灰右件為細末煉蜜和勻用之又牙香法生結香馢香零陵香甘松各三兩藿香丁香皮甲香各一兩麝香一錢右為麄末煉蜜放冷和勻依常法窨過􅅡之又牙香法檀香𤣥參各三兩甘松二兩乳香龍麝各半兩令研右先將檀香𤣥參剉細盛於銀器内以水浸慢火煑水盡取出焙乾與甘松同𢷬羅為末次入乳香末等一處用生蜜和勻乆窨然後用之又牙香法白檀香八兩細劈作片子以臈茶清浸一宿控出焙令乾用蜜酒中拌令得所再浸一宿慢火焙乾沈香三兩生結香四兩龍腦麝香各半兩甲香一兩先用灰煑次用一生土煑次用酒蜜煑漉出用右另將龍麝别研外諸香同𢷬羅入生蜜拌勻以瓷罐貯窨地中月餘出印香法夾馢香白檀香各半兩白茅香二兩藿香一分甘松甘草乳香各半兩馢香二兩麝香四錢甲香一分龍腦一錢沈香半兩右除龍麝乳香别研外都𢷬羅為末拌和令勻用之又印香法黄熟香六斤香附子丁香皮五兩藿香零陵香檀香白芷各四兩棗半斤焙茅香二斤茴香二兩甘松半斤乳香一兩生結香四兩右𢷬羅為末如常法用之傅身香粉法英粉青木香麻黄根附子甘松藿香零陵香已上各等分右件除英粉外同𢷬羅為細末用夾絹袋盛浴了傅之梅花香法甘松零陵香各一兩檀香茴香各半兩丁香一百枚龍腦少許右為細末煉蜜令合和之乾濕得中用衣香法零陵香一斤甘松檀香各十兩丁香皮半兩辛夷半兩茴香一分右𢷬羅為末入龍麝少許用之窨酒龍腦丸法龍麝二味用研丁香木香官桂胡椒紅豆縮砂白芷已上各一分馬哱少許右除龍麝另研外同𢷬羅為細末蜜為丸和如櫻桃大一斗酒置一丸於其中却封繫令宻三五日開飲之其味特香美毬子香法艾蒳一兩松樹上青衣是也酸棗一升入水少許研取汁一碗日煎成膏用丁香檀香茅香香附子白芷五味各半兩草荳􅅳龍腦少許右除龍腦另硏外都𢷬羅以􅀥膏與熟蜜合和得中入臼杵令不粘杵即止丸如梧桐子大毎燒一丸欲盡其煙直上如一毬子移時不散窨香法凡和合香須入窨貴其燥濕得宜也毎合香和訖約多少用不津器貯之封之以蠟紙於靜室屋中入地三五寸瘞之月餘日取出逐旋開取然之則其香尤䭲􅀈也薰香法凡薰衣以沸湯一大甌置薰籠下以所薰衣覆之令潤氣通徹貴香入衣難散也然後於湯爐中燒香餅子一枚以灰葢或用薄銀楪子尤妙置香在上薰之常令煙得所薰訖疊衣隔宿衣之數日不散造香餅子法軟灰三斤蜀葵葉或花一斤半貴其粘同𢷬令勻細如末可丸更入薄糊少許毎如彈子大捍作餅子㬠乾貯瓷瓶内逐旋燒用如無葵則以炭中半入紅花滓同𢷬用薄糊和之亦可香譜卷下

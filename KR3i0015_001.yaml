body:
  text: 香譜卷上香之品龍腦香酉陽雜俎云出波律國樹髙八九丈可六七尺圍葉圓而背白其樹有肥瘦形似松脂作杉木氣乾脂謂之龍腦香清脂謂之波律膏子似豆蔲皮有甲錯海藥本草云味苦辛微溫無毒主內外障眼三蟲療五痔眀目鎮心袐精又有蒼龍腦主風疹皯入膏煎良不可點眼眀淨如雪花者善久經風日或如麥麩者不佳云合黑豆糯米相思子貯之不耗今復有生熟之異稱生龍腦即上之所載是也其絶妙者目曰梅花龍腦有經火飛結成塊者謂之熟龍腦氣味差薄焉蓋易入他物故也麝香唐本草云生中臺川谷及雍州益州皆有之陶隱居云形似麞常食柏葉及噉蛇或於五月得者往往有蛇皮骨主辟邪殺鬼精中惡風毒療傷多以一子真香分糅作三四子刮取血膜雜以餘物大都亦有精粗破皮毛共在裹中者為勝或有夏食蛇蟲多至寒香滿入春患急痛自以腳剔出人有得之者此香絶勝帶麝非但香辟惡以香真者一子著腦間枕之辟惡夢及尸疰鬼氣今或傳有水麝臍其香尤美沈水香唐本草注云出天竺單于二國與青桂雞骨馢香同是一樹葉似橘經冬不雕夏生花白而圓細秋結實如檳榔色紫似椹而味辛療風水毒腫去惡氣樹皮青色木似櫸栁重實黑色沈水者是今復有生黃而沈水者謂之蠟沈又其不沈者謂之生結又拾遺解紛云其樹如椿常以水試乃知餘見下卷天香傳中白檀香陳藏器云本草拾遺曰樹如檀出海南主心腹痛霍亂中惡鬼氣殺蟲又唐本草云味鹹微寒主惡風毒出崑崙盤盤之國主消風積水腫又有紫真檀人磨之以塗風腫雖不生於中華而人間遍有之蘇合香神農本草云生中臺川谷陶隱居云俗傳是師子糞外國説不爾今皆從西域來真者難别紫赤色如紫檀堅實極芬香重如石燒之灰白者佳主辟邪瘧癎疰去三蟲安息香本草云出西戎似柏脂黃黑色為塊新者亦柔軟味辛苦無毒主心腹惡氣鬼疰酉陽雜俎曰安息香出波斯國其樹呼為辟邪樹長三丈許皮色黃黑葉有四角經冬不雕二月有花黃色心微碧不結實刻皮出膠如飴名安息香鬱金香魏略云生大秦國二三月花如紅藍四五月採之其香十二葉為百草之英本草拾遺曰味苦無毒主蟲毒鬼疰鴉鶻等臭除心腹間惡氣鬼疰入諸香用説文曰鬱金芳草煮以釀鬯以降神也雞舌香唐本草云生崑崙及交愛以南樹有雌雄皮不並似栗其花如梅結實似棗核者雌樹也不入香用無子者雄樹也採花釀以成香微溫主心痛惡瘡療風毒去惡氣薰陸香廣志云生南海又僻方注曰即羅香也海藥本草云味平溫無毒主清人神其香樹一名馬尾香是不皮鱗甲採之復生又唐本草注云出天竺國及邯祁似楓松脂黃白色天竺者多白邯祁者夾緑色香不甚烈微溫主伏尸惡氣療風水腫毒惡瘡詹糖香本草云出晉安岑州及交廣以南樹似橘煎枝葉為之似糖而黑多以其皮及蠧糞雜之不得淳正者惟軟乃佳丁香山海經曰生東海及崑崙國二三月花開七月方結實開寶本草注云生廣州樹髙丈餘凌冬不凋葉似櫟而花圓細色黃子如丁長四五分紫色中有粗大長寸許者俗呼為母丁香擊之則順理而折味辛主風毒諸腫能發諸香及止乾霍亂嘔吐各驗波律香本草拾遺曰出波律國與龍腦同樹之清脂也除惡氣殺蟲疰見龍腦香即波律膏也乳香廣志云即南海波斯國松樹脂有紫赤櫻桃者名乳香蓋薰陸之類也仙方多用辟邪其性溫療耳聾中風口噤婦人血風能發酒治風冷止大腸泄僻療諸瘡癤令內消今以通眀者為勝目曰的乳其次曰揀香又次曰瓶香然多夾雜成大塊如􅅹青之狀又其細者謂之香纒青桂香本草拾遺曰即沈香同樹細枝緊實未爛者雞骨香本草拾遺記曰亦馢香中形似雞骨者木香本草云一名蜜香從外國舶上來葉似薯蕷而根大花紫色功效極多味辛溫而無毒主辟溫療氣劣氣不足消毒殺蟲毒今以如雞骨堅實齧之粘齒者為上復有馬兜苓根謂之青木香非此之謂也或云有二種亦恐非耳一謂之雲南根降真香南州記曰生南海諸山又云生大秦國海藥本草曰味溫平無毒主天行時氣宅舍怪異並燒之有驗仙傳云燒之感引鶴降醮星辰燒此香甚為第一小兒帶之能辟邪氣其香如蘇方木然之初不甚香得諸香和之則特美艾蒳香廣志云出西國似細艾又云松樹皮緑衣亦名艾蒳可以合諸香燒之能聚其煙青白不散本草拾遺曰味溫無毒主惡氣殺蛀蟲主腹冷泄痢甘松香本草拾遺曰味溫無毒主鬼氣卒心腹痛脹滿浴人身令香叢生葉細廣志云甘松香生涼州零陵香南越志云一名燕草又名薰草生零陵山谷葉如羅勒山海經曰薰草似麻葉方莖氣如蘼蕪可以止癘即零陵香味苦無毒主惡氣注心腹痛下氣令體香和諸香或作湯丸用得酒良茅香花唐本草云生劔南諸州其莖葉黑褐色花白非白茅也味苦溫無毒主中惡溫胃止嘔吐葉苗可煮湯浴辟邪氣令人香馢香本草拾遺曰亦沈香同樹以其肌理有黑脈者謂之也黃熟香亦馢香之類也但輕虛枯朽不堪者今和香中皆用之水盤香類黃熟而殊大多雕刻為香山佛像並出舶上白眼香亦黃熟之别名也其色差白不入藥品和香或用之葉子香即馢香之薄者其香尤勝於馢又謂之龍鱗香雀頭香本草云即香附子也所在有之葉莖都似三稜根若附子周匝多毛交州者最勝大如棗核近道者如杏仁許荆襄人謂之莎草根大下氣除胸腹中熱合和香用之尤佳藝香倉頡解詁曰藝蒿似邪蒿可食魚豢典略云藝香辟紙魚蠧故藏書臺稱藝臺蘭香川本草云味辛平無毒主利水道殺蟲毒辟不祥一名水香生大吳池澤葉似蘭尖長有岐花紅白色而香煮水浴以治風芳香本草云即白芷也一名茞又名虈又曰萖又曰符離又名澤芬生下濕地河東川谷尤佳近道亦有道家以此香浴去尸蟲蘹香本草云即杜衡也葉似葵形如馬蹄俗呼為馬蹄香藥中少用惟道家服令人身香蕙香廣志云蕙草緑葉紫花魏武帝以為香燒之白膠香唐本草注云樹髙大木理細莖葉三角商洛間多有五月斫為坎十一月收脂開寶本草云味辛苦無毒主病丙穩禾疹風癢浮腫即楓香脂都梁香荆州記曰都梁縣有山山上有水其中生蘭草因名都梁香形如霍香古詩曰博山爐中百和香鬱金蘇合及都梁廣志云都梁出淮南亦名煎澤草也甲香唐本草云蠡類生雲南者大如掌青黃色長四五寸取黶燒灰用之南人亦煮其肉噉今合香多用謂能發香復來香煙須酒蜜煮製方可用法見下白茅香本草拾遺記曰味甘平無毒主惡氣令人身香煮汁服之主腹內冷痛生安南如茅根道家用煮湯沐浴必栗香內典云一名化木香似老椿海藥本草曰味辛溫無毒主鬼疰心氣斷一切惡氣葉落水中魚暴死木可為書軸辟白魚不損書兜婁香異物志云出海邊國如都梁香本草曰性微溫療霍亂心痛主風水毒腫惡氣止吐逆亦合香用莖葉似水蘇藒車香本草拾遺曰味辛溫主鬼氣去臭及蟲魚蛀物生彭城高數尺白花爾雅曰藒車芞輿注曰香草也兜納香廣志曰生剽國魏略曰出大秦國本草拾遺曰味溫甘無毒去惡氣溫中除冷耕香南方草木狀曰耕香莖生細葉本草拾遺曰味辛溫無毒主臭鬼氣調中生烏滸國木蜜香內典云狀若槐樹異物志云其葉如椿交州記云樹似沈香本草拾遺曰味甘溫無毒主辟惡去邪鬼疰生南海諸山中種五六年便有香也迷迭香廣志云出西域魏文帝有賦亦嘗用本草拾遺曰味辛溫無毒主惡氣令人衣香燒之去邪香之異都夷香洞冥記香如棗核食一顆歷月不飢或投水中俄滿大盂也荼蕪香王子年拾遺記燕昭王廣延國二舞人帝以荼蕪香屑鋪地四五寸使舞人立其上彌日無迹香出波弋國浸地則土石皆香著朽木腐草莫不茂蔚以薰枯骨則肌肉皆生又出獨異志辟寒香辟邪香瑞麟香金鳯香皆異國所獻杜陽編云自兩漢至皇唐皇后公主乘七寶輦四面綴五色玉香囊囊中貯上四香每一出遊則芬馥滿路月支香瑞應圖大漢二年月支國貢神香武帝取看之狀若燕卵凡三枚大似棗帝不燒付外庫後長安中大疫宫人得疾衆使者請燒一枚以辟疫氣帝然之宫中病者差長安百里內聞其香積九月不歇振靈香十洲記聚窟州有大樹如楓而葉香聞數百里名曰返魂樹根於玉釜中煮汁如飴名曰驚精香又曰振靈香又曰返生香又曰馬精香又名却死香一種五名靈物也香聞數百里死尸在地聞即活千畝香述異記曰南郡有千畝香林名香往往出其中十里香述異記曰千年松香聞於十里􅶵齊香酉陽雜俎曰出波斯國拂林呼為頂勃梨咃長一丈餘圍一尺許皮色青薄而極光淨葉似阿魏每三葉生於條端無花結實西域人常八月伐之至冬更抽新條極滋茂若不剪除返枯死七月斷其枝有黃汁其狀如蜜微有香氣入藥療百病龜甲香述異記曰即桂香之善者兜末香本草拾遺曰燒去惡氣除病疫漢武帝故事曰西王母降上燒是香兜渠國所獻如大豆塗宫門香聞百里關中大疫死者相枕燒此香疫則止內傳云死者皆起此則靈香非中國所致沈光香洞冥記塗魂國貢門中燒之有光而堅實難碎太醫以鐵杵舂如粉而燒之沈榆香封禪記黃帝列圭玉於蘭蒲席上然沈榆香舂雜寶為屑以沈榆和之若泥以分尊卑華戎之位茵墀香拾遺記靈帝初平三年西域獻煮湯辟癘宫人以沐頭石葉香拾遺記曰此香疊疊狀如雲母其氣辟癘魏文帝時題腹國獻鳯腦香杜陽編穆宗嘗於藏真島前焚之以崇禮敬紫述香述異記一名紅藍香又名金香又名麝香草香出蒼梧桂林二郡界威香孫氏瑞應圖曰瑞草曰一名威蕤王者禮備則生于殿前又云王者愛人命則生百濯香拾遺記孫亮寵姬四人合四氣香皆殊方異國所獻凡經踐躡安息之處香氣在衣彌年不歇因香名百濯復目其室曰思香媚寢龍文香杜陽編武帝時所獻忘其國名千步香述異記南海出千步香佩之香聞於千步草也今海隅有千步草是其種也葉似杜若而紅碧相雜貢籍曰南郡貢千步香薰肌香洞𡨕記用薰人肌骨至老不病蘅蕪香拾遺記漢武帝夢李夫人授蘅蕪之香帝夢中驚起香氣猶著衣枕歷月不歇九和香三洞珠囊曰天人玉女搗羅天香按擎玉爐燒九和之香九真雄麝香西京雜記趙昭儀上姊飛燕三十五物有青水香沈水香九真雄麝香罽賔國香盧氏雜説楊牧嘗召崔安石食盤前置香一爐煙出如樓臺之狀崔别聞一香非似爐煙崔思之楊顧左右取白角楪子盛一漆毬子呈崔曰此罽賔國香所聞即此香也拘物頭花香唐太宗實録曰罽賔國進拘物頭花香香聞數里升霄靈香杜陽編同昌公主薨主哀痛常令賜紫尼及女道冠焚升霄靈之香擊歸天紫金之磬以導靈舁祇精香洞冥記出塗魂國燒此香魑魅精祇皆畏避飛氣香三洞珠囊隱訣云真檀之香夜泉玄脂朱陵飛之香返生之香皆真人所燒之香也金磾香洞冥記金日磾既入侍欲衣服香潔得氤氲之氣自合此香帝果悅之日磾嘗以自薰宫人以見者每增其媚五香三洞珠囊曰五香一株五根一莖五枝一枝五葉一葉間五節五五相對故先賢名之五香之木燒之十日上徹九星之天即青木香也千和香三洞珠囊峨嵋山孫真人然千和之香兜婁婆香楞嚴經壇前别安一小爐以此香煎取香水沐浴其炭然令猛熾多伽羅香釋氏會要曰多伽羅香此云根香多摩羅跋香此云藿香旃檀釋云與樂即白檀也能治熱病赤檀能治風腫大象藏香釋氏會要曰因龍鬭而生若燒其一丸興大光明細雲覆上味如甘露七晝夜降其甘雨牛頭旃檀香華嚴經云從離垢出若以塗身火不能燒羯布羅香西域記云其樹松身異葉花果亦别初採既濕尚未有香木乾之後循理而折之其中有香木乾之後色如氷雪亦龍腦香薝蔔花香法華經云須曼那華香闍提華香末利花香羅羅華香青赤白蓮華香華樹香果樹香旃檀香沈水香多摩羅跋香多伽羅香象香馬香男香女香拘鞞陀羅樹香曼陀羅花香殊沙華香香譜卷上
